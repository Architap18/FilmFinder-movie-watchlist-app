<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FilmFinder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
  <div class="logo"><span>FilmFinder</span></div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search for movies, TV shows..." />
    <button onclick="handleSearch()">Search</button>
  </div>
  <div class="nav-links">
    <a href="#" class="active">Home</a>
    <a >Watchlist</a>
    <button id="toggle">🌙</button>
  </div>
</header>

<!-- the board -->
<section class="hero">
  <div class="hero-content">
    <h1>Discover Your Next<br>Favourite Story</h1>
    <p> Millions of movies, TV shows and people to discover. Explore now.</p>
    <button ><a style=" text-decoration: none; color: white;" href="#trend">Explore Trending</a></button>
  </div>
</section>

<div class="c">
  <select id="sort">
    <option value="">Sort</option>
    <option value="az">A-Z</option>
    <option value="year">Year</option>
  </select>

  <select id="year">
    <option value="">All Years</option>
    <option value="2026">2026</option>
    <option value="2025">2025</option>
  </select>
  <select id="genre">
    <option value="">All</option>
    <option value="28">Action</option>
    <option value="35">Comedy</option>
    <option value="10749">Romance</option>
    <option value="27">Horror</option>
  </select>
</div>
</div>
<section id="trend">
<h2>Trending Now</h2>
<div class="trending-list"></div>
</section>
  <script src="js/api.js"></script>
  <script src="js/watchlist.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
