<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FilmFinder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
  <div class="logo"><span>FilmFinder</span></div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search for movies, TV shows..." />
    <button id="searchBtn">Search</button>
  </div>
  <div class="nav-links">
    <a href="#" class="active">Home</a>
    <a href="watchlist.html">Watchlist </a>
    <button id="toggle">🌙</button>
  </div>
</header>

<!-- the board -->
<section class="hero">
  <div class="hero-content">
    <h1>Discover Your Next<br>Favourite Story</h1>
    <p> Millions of movies, TV shows and people to discover. Explore now.</p>
    <button ><a style=" text-decoration: none; color: white;" href="#trend">Explore Trending</a></button>
  </div>
</section>

<div class="c">
  <select id="sort">
    <option value="">Sort</option>
    <option value="az">A-Z</option>
    <option value="year">Year</option>
  </select>

  <select id="year">
    <option value="">All Years</option>
    <option value="2026">2026</option>
    <option value="2025">2025</option>
  </select>
  <select id="genre">
    <option value="">All</option>
    <option value="28">Action</option>
    <option value="35">Comedy</option>
    <option value="10749">Romance</option>
    <option value="27">Horror</option>
  </select>
</div>
</div>
<section id="trend">
<h2 style="text-align: center; font-size: xx-large;">TRENDING NOW</h2>
<div class="trending-list"></div>
</section>
<footer class="footer">

  <div class="footer-container">

    <!-- LEFT -->
    <div class="footer-col">
      <h2>🎬 FilmFinder</h2>
      <p>Discover your next favorite movie</p>
      <p class="email">📩 filmfinder.support@gmail.com</p>
    </div>

    <!-- CENTER -->
    <div class="footer-col">
      <h3>Quick Links</h3>
      <a href="index.html">🏠</a>
      <a href="watchlist.html">🎞️</a>
    </div>

    <!-- RIGHT -->
    <div class="footer-col">
      <h3>Connect</h3>
      <div class="social-icons">
        <a href="https://github.com/Architap18" target="_blank">🐙</a>
        <a href="https://www.linkedin.com/in/archita-pal-a5a23a2b7/" target="_blank">💼</a>
      </div>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 FilmFinder</p>
  </div>

</footer>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <div id="toast"></div>
</body>
</html>
